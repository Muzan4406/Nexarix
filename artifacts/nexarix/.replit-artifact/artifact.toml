kind = "web"
previewPath = "/"
title = "Nexarix"
version = "1.0.0"
id = "artifacts/nexarix"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20217

[services.development]
run = "pnpm --filter @workspace/nexarix run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/nexarix", "run", "build" ]
publicDir = "artifacts/nexarix/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20217"
BASE_PATH = "/"
