<svg width="180" height="180" viewBox="0 0 180 180" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="180" y2="180" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0d1b3e"/>
      <stop offset="100%" stop-color="#0a3580"/>
    </linearGradient>
    <linearGradient id="nGrad" x1="40" y1="38" x2="140" y2="142" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="45%" stop-color="#c8d8ff"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="180" height="180" rx="36" fill="url(#bg)"/>
  <!-- Orbit ring -->
  <ellipse cx="90" cy="90" rx="68" ry="20" stroke="#3b82f6" stroke-width="2.5" fill="none" opacity="0.55" transform="rotate(-30 90 90)"/>
  <!-- N letter -->
  <path d="M46 38 L46 142 L68 142 L68 84 L112 142 L134 142 L134 38 L112 38 L112 96 L68 38 Z"
    fill="url(#nGrad)" filter="url(#glow)"/>
  <!-- Arrow accent -->
  <path d="M118 48 L138 28 M138 28 L120 26 M138 28 L136 46"
    stroke="#3b82f6" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/>
</svg>
